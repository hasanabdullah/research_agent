<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Deepshika Dashboard</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f8f9fb; --bg3: #f0f1f4;
    --border: #e2e4e9; --text: #1a1a2e; --text2: #6b7280;
    --accent: #4f46e5; --green: #10b981; --yellow: #f59e0b;
    --red: #ef4444; --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* Sidebar */
  #sidebar { width: 260px; background: #2d2d2d; border-right: none; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 20px 20px 16px; }
  #sidebar-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
  #sidebar-header p { font-size: 11px; color: #9ca3af; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  #topic-list { flex: 1; overflow-y: auto; padding: 4px 10px; }
  .topic-card { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; transition: all 0.15s ease; }
  .topic-card:hover { background: #3a3a3a; }
  .topic-card.selected { background: #3a3a3a; border-color: #505050; }
  .topic-card .name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; color: #f0f0f0; }
  .topic-card .active-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; }
  .topic-card .running-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .topic-card .meta { font-size: 11px; color: #9ca3af; margin-top: 3px; display: flex; gap: 10px; }
  #new-topic-btn { margin: 10px; padding: 9px; background: transparent; border: 1px dashed #505050; border-radius: 8px; color: #9ca3af; cursor: pointer; text-align: center; font-size: 12px; font-weight: 500; transition: all 0.15s ease; }
  #new-topic-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #tabs { display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); padding: 0 24px; }
  .tab { padding: 12px 14px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; transition: color 0.15s ease; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }
  #empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 14px; }

  /* Monitor tab */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }
  .budget-bar { background: var(--bg3); border-radius: 4px; height: 6px; margin-top: 10px; overflow: hidden; }
  .budget-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .identity-section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
  .identity-section h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); font-weight: 600; }
  .identity-section .trait { display: inline-block; background: #f0efff; border: none; border-radius: 20px; padding: 3px 12px; font-size: 12px; margin: 2px 4px 2px 0; color: var(--accent); font-weight: 500; }
  .cycles-list { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .cycles-list h3 { font-size: 13px; padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--text); font-weight: 600; }
  .cycle-row { padding: 10px 18px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; gap: 12px; }
  .cycle-row:last-child { border-bottom: none; }
  .cycle-row .num { color: var(--text2); min-width: 60px; font-weight: 500; }
  .cycle-row .action { color: var(--yellow); min-width: 100px; font-weight: 500; }
  .cycle-row .summary { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cycle-row .cost { color: var(--text2); font-family: var(--mono); font-size: 12px; }

  /* Research tab */
  .file-list { display: grid; gap: 8px; margin-bottom: 20px; }
  .file-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s ease; box-shadow: var(--shadow-sm); }
  .file-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .file-item .fname { font-size: 13px; font-family: var(--mono); font-weight: 500; }
  .file-item .fsize { font-size: 11px; color: var(--text2); }
  .file-viewer { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); }
  .file-viewer h3 { font-size: 14px; color: var(--text); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
  .file-viewer .back-btn { font-size: 12px; color: var(--text2); cursor: pointer; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-weight: 500; transition: all 0.15s ease; }
  .file-viewer .back-btn:hover { color: var(--text); border-color: var(--text2); }
  .md-content { font-size: 14px; line-height: 1.8; color: var(--text); }
  .md-content h1 { font-size: 20px; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 700; letter-spacing: -0.3px; }
  .md-content h2 { font-size: 17px; margin: 18px 0 8px; color: var(--accent); font-weight: 600; }
  .md-content h3 { font-size: 15px; margin: 14px 0 6px; font-weight: 600; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
  .md-content li { margin: 4px 0; }
  .md-content code { font-family: var(--mono); background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--accent); }
  .md-content pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin: 12px 0; }
  .md-content pre code { background: none; padding: 0; color: var(--text); }
  .md-content a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .md-content a:hover { text-decoration: underline; }
  .md-content strong { color: var(--text); font-weight: 600; }
  .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text2); margin: 10px 0; font-style: italic; }

  /* Configure tab */
  .config-section { margin-bottom: 28px; }
  .config-section h3 { font-size: 13px; color: var(--text); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .config-section textarea { width: 100%; min-height: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 14px; resize: vertical; line-height: 1.6; box-shadow: var(--shadow-sm); transition: border-color 0.15s ease; }
  .config-section textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .config-section input[type="number"] { width: 120px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 8px 12px; box-shadow: var(--shadow-sm); transition: border-color 0.15s ease; }
  .config-section input[type="number"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .budget-form { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .budget-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: all 0.15s ease; box-shadow: var(--shadow-sm); }
  .save-btn:hover { opacity: 0.9; box-shadow: var(--shadow); }
  .save-btn.saved { background: var(--green); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 440px; box-shadow: var(--shadow-md); }
  .modal h2 { font-size: 17px; margin-bottom: 20px; font-weight: 700; letter-spacing: -0.2px; }
  .modal input, .modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 14px; margin-bottom: 12px; font-family: var(--font); transition: border-color 0.15s ease; }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .modal textarea { min-height: 60px; resize: vertical; }
  .modal .budget-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .modal .budget-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .modal .budget-row input { margin-bottom: 0; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-actions button { padding: 9px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; transition: all 0.15s ease; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border) !important; }
  .btn-secondary:hover { background: var(--border); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header" style="text-align:center">
    <img src="/logo.png" alt="Deepshika" style="width:64px;height:64px;border-radius:10px;margin-bottom:8px">
    <h1>DeepShika</h1>
    <p>Research Agent</p>
  </div>
  <div id="topic-list"></div>
  <div id="new-topic-btn" onclick="showCreateModal()">+ New Agent</div>
</div>

<div id="main">
  <div id="tabs">
    <div class="tab active" data-tab="insights" onclick="switchTab('insights')">Insights</div>
    <div class="tab" data-tab="monitor" onclick="switchTab('monitor')">Monitor</div>
    <div class="tab" data-tab="research" onclick="switchTab('research')">Research Output</div>
    <div class="tab" data-tab="configure" onclick="switchTab('configure')">Configure</div>
    <div id="agent-control" style="display:flex;align-items:center;gap:8px;margin-left:4px"></div>
  </div>
  <div id="content">
    <div id="empty-state">Select a topic from the sidebar</div>
  </div>
</div>

<script>
let state = { topics: [], selected: null, tab: 'insights', config: {} };
let refreshTimer = null;

async function api(path, opts) {
  // Encode path segments but preserve query string
  const [pathPart, query] = path.split('?');
  const encoded = pathPart.split('/').map(s => encodeURIComponent(s)).join('/');
  const url = '/api/' + encoded + (query ? '?' + query : '');
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function load() {
  state.config = await api('config');
  state.topics = await api('topics');
  renderSidebar();
  // Auto-select active topic
  if (!state.selected && state.config.active_topic) {
    selectTopic(state.config.active_topic);
  }
  manageAutoRefresh();
}

function manageAutoRefresh() {
  const anyRunning = state.topics.some(t => t.running);
  if (anyRunning && !refreshTimer) {
    refreshTimer = setInterval(refreshData, 5000);
  } else if (!anyRunning && refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

async function refreshData() {
  try {
    state.topics = await api('topics');
    renderSidebar();
    // Refresh current tab content if on monitor
    if (state.selected && state.tab === 'monitor') {
      renderMonitor();
    }
  } catch (e) { /* ignore refresh errors */ }
  manageAutoRefresh();
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderSidebar() {
  const el = document.getElementById('topic-list');
  el.innerHTML = state.topics.map(t => {
    const n = esc(t.name);
    return `
    <div class="topic-card ${state.selected === t.name ? 'selected' : ''}" onclick="selectTopic('${n}')">
      <div class="name">
        ${t.running ? '<span class="running-dot" title="Running"></span>' : (t.active ? '<span class="active-dot"></span>' : '')}
        ${escHtml(t.name)}
      </div>
      <div class="meta">
        <span>${t.cycles} cycles</span>
        <span>$${t.cost.toFixed(4)}</span>
        ${t.running ? '<span style="color:var(--green)">running</span>' : ''}
      </div>
    </div>
  `}).join('');
}

async function startAgent(name) {
  try {
    await api(`agents/${name}/start`, { method: 'POST' });
    await load();
    renderAgentControl();
  } catch (e) {
    alert('Failed to start agent: ' + e.message);
  }
}

async function stopAgent(name) {
  try {
    await api(`agents/${name}/stop`, { method: 'POST' });
    await load();
    renderAgentControl();
  } catch (e) {
    alert('Failed to stop agent: ' + e.message);
  }
}

async function selectTopic(name) {
  state.selected = name;
  renderSidebar();
  renderAgentControl();
  switchTab(state.tab);
}

function renderAgentControl() {
  const el = document.getElementById('agent-control');
  if (!state.selected) { el.innerHTML = ''; return; }
  const t = state.topics.find(t => t.name === state.selected);
  if (!t) { el.innerHTML = ''; return; }
  const n = esc(t.name);
  if (t.running) {
    el.innerHTML = `
      <span class="running-dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite"></span>
      <span style="color:var(--green);font-size:12px">Running</span>
      <button style="font-size:11px;background:none;border:1px solid var(--red);border-radius:6px;padding:3px 10px;cursor:pointer;color:var(--red)" onmouseover="this.style.background='var(--red)';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='var(--red)'" onclick="stopAgent('${n}')">Stop</button>
    `;
  } else {
    el.innerHTML = `<button style="font-size:11px;background:var(--green);border:1px solid var(--green);border-radius:6px;padding:3px 10px;cursor:pointer;color:#fff;font-weight:500" onclick="startAgent('${n}')">Start</button>`;
  }
}

async function switchTopic(name) {
  await api(`topics/${name}/switch`, { method: 'POST' });
  state.config.active_topic = name;
  state.topics.forEach(t => t.active = t.name === name);
  renderSidebar();
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (!state.selected) return;
  if (tab === 'insights') renderInsights();
  else if (tab === 'monitor') renderMonitor();
  else if (tab === 'research') renderResearch();
  else if (tab === 'configure') renderConfigure();
}

// --- Insights ---
function formatTimestamp(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString();
}

async function renderInsights() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';

  const [files, existing] = await Promise.all([
    api(`topics/${state.selected}/research`),
    api(`topics/${state.selected}/summary`).catch(() => ({ summary: null, generated_at: null }))
  ]);

  const hasResearch = files.length > 0 && files.some(f => f.size > 0);

  if (existing.summary) {
    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:18px;margin-bottom:4px">${state.selected} — Insights</h2>
          <div id="summary-timestamp" style="font-size:12px;color:var(--text2)">Last summarized: ${formatTimestamp(existing.generated_at)}</div>
        </div>
        <button class="save-btn" id="summarize-btn" onclick="summarizeTopic()" style="margin:0">Re-summarize</button>
      </div>
      <div id="summary-area">
        <div class="file-viewer">
          <div class="md-content">${renderMd(existing.summary)}</div>
        </div>
      </div>
    `;
  } else if (hasResearch) {
    el.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px">
        <div style="color:var(--text2);font-size:15px">No summary yet for <strong style="color:var(--text)">${state.selected}</strong></div>
        <button class="save-btn" id="summarize-btn" onclick="summarizeTopic()" style="margin:0;font-size:14px;padding:10px 24px">Summarize Research</button>
      </div>
      <div id="summary-area"></div>
      <div id="summary-timestamp" style="display:none"></div>
    `;
  } else {
    el.innerHTML = '<div id="empty-state">No research output yet. Run some cycles to generate research.</div>';
  }
}

async function summarizeTopic() {
  const btn = document.getElementById('summarize-btn');
  const area = document.getElementById('summary-area');
  const ts = document.getElementById('summary-timestamp');
  btn.disabled = true;
  btn.textContent = 'Summarizing...';
  area.innerHTML = '<div style="color:var(--text2);padding:16px">Generating summary from research files...</div>';

  try {
    const result = await api(`topics/${state.selected}/summarize`, { method: 'POST' });
    area.innerHTML = `
      <div class="file-viewer">
        <div class="md-content">${renderMd(result.summary)}</div>
      </div>
    `;
    btn.textContent = 'Re-summarize';
    ts.style.display = '';
    ts.textContent = 'Last summarized: ' + formatTimestamp(result.generated_at);
    // Re-render fully to get the proper layout if we were on the empty state
    renderInsights();
  } catch (e) {
    area.innerHTML = `<div style="color:var(--red);padding:16px">Failed to summarize: ${escHtml(e.message)}</div>`;
    btn.textContent = 'Summarize Research';
    btn.disabled = false;
  }
}

// --- Monitor ---
async function renderMonitor() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const [detail, cycles] = await Promise.all([
    api(`topics/${state.selected}`),
    api(`topics/${state.selected}/cycles?n=20`)
  ]);

  // Use per-agent budget if available, else fall back to global
  const topicData = state.topics.find(t => t.name === state.selected);
  const agentBudget = topicData && topicData.budget;
  const globalBudget = state.config.budget || {};
  const maxTotal = (agentBudget && agentBudget.max_total_usd) || globalBudget.max_total_usd || 10;
  const maxDaily = (agentBudget && agentBudget.max_per_day_usd) || globalBudget.max_per_day_usd || 10;
  const pct = Math.min(100, (detail.cost.total_usd / maxTotal) * 100);
  const barColor = pct > 80 ? 'var(--red)' : pct > 50 ? 'var(--yellow)' : 'var(--green)';
  const isRunning = topicData && topicData.running;

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <h2 style="font-size:18px">${state.selected}</h2>
      ${isRunning
        ? '<span style="color:var(--green);font-size:13px;display:flex;align-items:center;gap:4px"><span class="running-dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite"></span> Running</span>'
        : '<span style="color:var(--text2);font-size:13px">Stopped</span>'
      }
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Cycles</div>
        <div class="value">${detail.cycles}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Cost</div>
        <div class="value">$${detail.cost.total_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Today</div>
        <div class="value">$${detail.cost.today_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">API Calls</div>
        <div class="value">${detail.cost.total_calls}</div>
      </div>
      <div class="stat-card" style="grid-column: span 2;">
        <div class="label">Budget -- $${detail.cost.total_usd.toFixed(4)} / $${maxTotal.toFixed(2)} total | $${detail.cost.today_usd.toFixed(4)} / $${maxDaily.toFixed(2)} daily</div>
        <div class="budget-bar"><div class="fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
    </div>
    <div class="identity-section">
      <h3>${detail.identity.name} v${detail.identity.version}</h3>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${detail.identity.purpose || ''}</div>
      <div>${(detail.identity.traits || []).map(t => `<span class="trait">${t}</span>`).join('')}</div>
    </div>
    <div class="cycles-list">
      <h3>Recent Cycles</h3>
      ${cycles.length === 0 ? '<div style="padding:12px 16px;color:var(--text2)">No cycles yet</div>' :
        cycles.reverse().map(c => `
          <div class="cycle-row">
            <span class="num">Cycle ${c.cycle || '?'}</span>
            <span class="action">${c.action || 'unknown'}</span>
            <span class="summary">${(c.summary || '').slice(0, 80)}</span>
            <span class="cost">$${(c.cost_after || 0).toFixed(4)}</span>
          </div>
        `).join('')}
    </div>
  `;
}

// --- Research ---
async function renderResearch() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const files = await api(`topics/${state.selected}/research`);
  if (files.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:20px">No research files yet. Run some cycles to generate research.</div>';
    return;
  }
  el.innerHTML = `
    <div class="file-list">
      ${files.map(f => `
        <div class="file-item" onclick="viewFile('${f.name}')">
          <span class="fname">${f.name}</span>
          <span class="fsize">${(f.size / 1024).toFixed(1)} KB</span>
        </div>
      `).join('')}
    </div>
    <div id="file-viewer-area"></div>
  `;
}

async function viewFile(name) {
  const area = document.getElementById('file-viewer-area');
  area.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const data = await api(`topics/${state.selected}/research/${name}`);
  area.innerHTML = `
    <div class="file-viewer">
      <h3>${name} <button class="back-btn" onclick="this.closest('.file-viewer').remove()">Close</button></h3>
      <div class="md-content">${renderMd(data.content)}</div>
    </div>
  `;
}

// --- Configure ---
async function renderConfigure() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const [mission, prompt] = await Promise.all([
    api(`topics/${state.selected}/mission`),
    api(`topics/${state.selected}/prompt`)
  ]);

  // Get current per-agent budget
  const topicData = state.topics.find(t => t.name === state.selected);
  const agentBudget = topicData && topicData.budget;
  const globalBudget = state.config.budget || {};
  const curTotal = (agentBudget && agentBudget.max_total_usd) || globalBudget.max_total_usd || 10;
  const curDaily = (agentBudget && agentBudget.max_per_day_usd) || globalBudget.max_per_day_usd || 10;

  el.innerHTML = `
    <div class="config-section">
      <h3>Agent Budget</h3>
      <div class="budget-form">
        <div class="budget-field">
          <label>Total budget ($)</label>
          <input type="number" id="budget-total" step="0.50" min="0" value="${curTotal}" />
        </div>
        <div class="budget-field">
          <label>Daily limit ($)</label>
          <input type="number" id="budget-daily" step="0.50" min="0" value="${curDaily}" />
        </div>
        <button class="save-btn" onclick="saveBudget(this)">Save Budget</button>
      </div>
    </div>
    <div class="config-section">
      <h3>mission.md</h3>
      <textarea id="mission-editor">${escHtml(mission.content)}</textarea>
      <button class="save-btn" onclick="saveMission(this)">Save Mission</button>
    </div>
    <div class="config-section">
      <h3>system_prompt.md</h3>
      <textarea id="prompt-editor">${escHtml(prompt.content)}</textarea>
      <button class="save-btn" onclick="savePrompt(this)">Save Prompt</button>
    </div>
  `;
}

async function saveBudget(btn) {
  const maxTotal = parseFloat(document.getElementById('budget-total').value);
  const maxDaily = parseFloat(document.getElementById('budget-daily').value);
  if (isNaN(maxTotal) || isNaN(maxDaily)) { alert('Enter valid numbers'); return; }
  await api(`topics/${state.selected}/budget`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ max_total_usd: maxTotal, max_per_day_usd: maxDaily })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Budget'; btn.classList.remove('saved'); }, 1500);
  // Reload topics to get updated budget
  state.topics = await api('topics');
  renderSidebar();
}

async function saveMission(btn) {
  const content = document.getElementById('mission-editor').value;
  await api(`topics/${state.selected}/mission`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Mission'; btn.classList.remove('saved'); }, 1500);
}

async function savePrompt(btn) {
  const content = document.getElementById('prompt-editor').value;
  await api(`topics/${state.selected}/prompt`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Prompt'; btn.classList.remove('saved'); }, 1500);
}

// --- Create modal ---
function showCreateModal() {
  const globalBudget = state.config.budget || {};
  const defaultTotal = globalBudget.max_total_usd || 10;
  const defaultDaily = globalBudget.max_per_day_usd || 10;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Create New Agent</h2>
      <input id="new-name" placeholder="Topic name (e.g. sports-research)" />
      <textarea id="new-desc" placeholder="One-line description"></textarea>
      <div class="budget-row">
        <div style="flex:1">
          <label>Total budget ($)</label>
          <input id="new-budget-total" type="number" step="0.50" min="0" value="${defaultTotal}" />
        </div>
        <div style="flex:1">
          <label>Daily limit ($)</label>
          <input id="new-budget-daily" type="number" step="0.50" min="0" value="${defaultDaily}" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-primary" onclick="createTopic()">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('new-name').focus();
}

async function createTopic() {
  const name = document.getElementById('new-name').value.trim();
  const desc = document.getElementById('new-desc').value.trim();
  const maxTotal = parseFloat(document.getElementById('new-budget-total').value);
  const maxDaily = parseFloat(document.getElementById('new-budget-daily').value);
  if (!name) return;
  const body = { name, description: desc };
  if (!isNaN(maxTotal)) body.max_total_usd = maxTotal;
  if (!isNaN(maxDaily)) body.max_per_day_usd = maxDaily;
  await api('topics', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  document.querySelector('.modal-overlay').remove();
  await load();
  selectTopic(name);
}

// --- Markdown renderer ---
function renderMd(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
