<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepshika Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
    --red: #f85149; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  #sidebar-header h1 { font-size: 16px; font-weight: 600; }
  #sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
  #topic-list { flex: 1; overflow-y: auto; padding: 8px; }
  .topic-card { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
  .topic-card:hover { background: var(--bg3); }
  .topic-card.selected { background: var(--bg3); border-color: var(--accent); }
  .topic-card .name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .topic-card .active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; }
  .topic-card .running-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .topic-card .meta { font-size: 12px; color: var(--text2); margin-top: 4px; display: flex; gap: 12px; }
  .topic-card .actions { display: flex; gap: 4px; margin-top: 6px; }
  .topic-card .agent-btn { font-size: 11px; background: none; border: 1px solid; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
  .topic-card .start-btn { color: var(--green); border-color: var(--green); }
  .topic-card .start-btn:hover { background: var(--green); color: var(--bg); }
  .topic-card .stop-btn { color: var(--red); border-color: var(--red); }
  .topic-card .stop-btn:hover { background: var(--red); color: var(--bg); }
  #new-topic-btn { margin: 8px; padding: 8px; background: var(--bg3); border: 1px dashed var(--border); border-radius: 6px; color: var(--accent); cursor: pointer; text-align: center; font-size: 13px; }
  #new-topic-btn:hover { border-color: var(--accent); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 16px; }
  .tab { padding: 10px 16px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 24px; }
  #empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 15px; }

  /* Overview tab */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .budget-bar { background: var(--bg3); border-radius: 4px; height: 8px; margin-top: 8px; overflow: hidden; }
  .budget-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .identity-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .identity-section h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .identity-section .trait { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 12px; margin: 2px 4px 2px 0; }
  .cycles-list { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .cycles-list h3 { font-size: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--accent); }
  .cycle-row { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; gap: 12px; }
  .cycle-row:last-child { border-bottom: none; }
  .cycle-row .num { color: var(--text2); min-width: 60px; }
  .cycle-row .action { color: var(--yellow); min-width: 100px; }
  .cycle-row .summary { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cycle-row .cost { color: var(--text2); font-family: var(--mono); font-size: 12px; }

  /* Research tab */
  .file-list { display: grid; gap: 8px; margin-bottom: 20px; }
  .file-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .file-item:hover { border-color: var(--accent); }
  .file-item .fname { font-size: 14px; font-family: var(--mono); }
  .file-item .fsize { font-size: 12px; color: var(--text2); }
  .file-viewer { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .file-viewer h3 { font-size: 14px; color: var(--accent); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .file-viewer .back-btn { font-size: 12px; color: var(--text2); cursor: pointer; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; }
  .file-viewer .back-btn:hover { color: var(--text); }
  .md-content { font-size: 14px; line-height: 1.7; }
  .md-content h1 { font-size: 20px; margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md-content h2 { font-size: 17px; margin: 14px 0 6px; color: var(--accent); }
  .md-content h3 { font-size: 15px; margin: 12px 0 4px; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
  .md-content li { margin: 4px 0; }
  .md-content code { font-family: var(--mono); background: var(--bg3); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .md-content pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin: 10px 0; }
  .md-content pre code { background: none; padding: 0; }
  .md-content a { color: var(--accent); }
  .md-content strong { color: #fff; }
  .md-content blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text2); margin: 8px 0; }

  /* Configure tab */
  .config-section { margin-bottom: 24px; }
  .config-section h3 { font-size: 14px; color: var(--accent); margin-bottom: 8px; }
  .config-section textarea { width: 100%; min-height: 200px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 12px; resize: vertical; line-height: 1.6; }
  .config-section textarea:focus { outline: none; border-color: var(--accent); }
  .config-section input[type="number"] { width: 120px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 8px 12px; }
  .config-section input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .budget-form { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .budget-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .save-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .save-btn:hover { opacity: 0.9; }
  .save-btn.saved { background: var(--green); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 440px; }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal input, .modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 14px; margin-bottom: 12px; font-family: var(--font); }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal textarea { min-height: 60px; resize: vertical; }
  .modal .budget-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .modal .budget-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .modal .budget-row input { margin-bottom: 0; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: var(--bg); font-weight: 500; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border) !important; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Deepshika</h1>
    <p>Agent Management</p>
  </div>
  <div id="topic-list"></div>
  <div id="new-topic-btn" onclick="showCreateModal()">+ New Agent</div>
</div>

<div id="main">
  <div id="tabs">
    <div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
    <div class="tab" data-tab="research" onclick="switchTab('research')">Research</div>
    <div class="tab" data-tab="configure" onclick="switchTab('configure')">Configure</div>
  </div>
  <div id="content">
    <div id="empty-state">Select a topic from the sidebar</div>
  </div>
</div>

<script>
let state = { topics: [], selected: null, tab: 'overview', config: {} };
let refreshTimer = null;

async function api(path, opts) {
  // Encode path segments but preserve query string
  const [pathPart, query] = path.split('?');
  const encoded = pathPart.split('/').map(s => encodeURIComponent(s)).join('/');
  const url = '/api/' + encoded + (query ? '?' + query : '');
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function load() {
  state.config = await api('config');
  state.topics = await api('topics');
  renderSidebar();
  // Auto-select active topic
  if (!state.selected && state.config.active_topic) {
    selectTopic(state.config.active_topic);
  }
  manageAutoRefresh();
}

function manageAutoRefresh() {
  const anyRunning = state.topics.some(t => t.running);
  if (anyRunning && !refreshTimer) {
    refreshTimer = setInterval(refreshData, 5000);
  } else if (!anyRunning && refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

async function refreshData() {
  try {
    state.topics = await api('topics');
    renderSidebar();
    // Refresh current tab content if on overview
    if (state.selected && state.tab === 'overview') {
      renderOverview();
    }
  } catch (e) { /* ignore refresh errors */ }
  manageAutoRefresh();
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderSidebar() {
  const el = document.getElementById('topic-list');
  el.innerHTML = state.topics.map(t => {
    const n = esc(t.name);
    return `
    <div class="topic-card ${state.selected === t.name ? 'selected' : ''}" onclick="selectTopic('${n}')">
      <div class="name">
        ${t.running ? '<span class="running-dot" title="Running"></span>' : (t.active ? '<span class="active-dot"></span>' : '')}
        ${escHtml(t.name)}
      </div>
      <div class="meta">
        <span>${t.cycles} cycles</span>
        <span>$${t.cost.toFixed(4)}</span>
        ${t.running ? '<span style="color:var(--green)">running</span>' : ''}
      </div>
      <div class="actions">
        ${t.running
          ? `<button class="agent-btn stop-btn" onclick="event.stopPropagation(); stopAgent('${n}')">Stop</button>`
          : `<button class="agent-btn start-btn" onclick="event.stopPropagation(); startAgent('${n}')">Start</button>`
        }
      </div>
    </div>
  `}).join('');
}

async function startAgent(name) {
  try {
    await api(`agents/${name}/start`, { method: 'POST' });
    await load();
  } catch (e) {
    alert('Failed to start agent: ' + e.message);
  }
}

async function stopAgent(name) {
  try {
    await api(`agents/${name}/stop`, { method: 'POST' });
    await load();
  } catch (e) {
    alert('Failed to stop agent: ' + e.message);
  }
}

async function selectTopic(name) {
  state.selected = name;
  renderSidebar();
  switchTab(state.tab);
}

async function switchTopic(name) {
  await api(`topics/${name}/switch`, { method: 'POST' });
  state.config.active_topic = name;
  state.topics.forEach(t => t.active = t.name === name);
  renderSidebar();
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (!state.selected) return;
  if (tab === 'overview') renderOverview();
  else if (tab === 'research') renderResearch();
  else if (tab === 'configure') renderConfigure();
}

// --- Overview ---
async function renderOverview() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const [detail, cycles] = await Promise.all([
    api(`topics/${state.selected}`),
    api(`topics/${state.selected}/cycles?n=20`)
  ]);

  // Use per-agent budget if available, else fall back to global
  const topicData = state.topics.find(t => t.name === state.selected);
  const agentBudget = topicData && topicData.budget;
  const globalBudget = state.config.budget || {};
  const maxTotal = (agentBudget && agentBudget.max_total_usd) || globalBudget.max_total_usd || 10;
  const maxDaily = (agentBudget && agentBudget.max_per_day_usd) || globalBudget.max_per_day_usd || 10;
  const pct = Math.min(100, (detail.cost.total_usd / maxTotal) * 100);
  const barColor = pct > 80 ? 'var(--red)' : pct > 50 ? 'var(--yellow)' : 'var(--green)';
  const isRunning = topicData && topicData.running;

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <h2 style="font-size:18px">${state.selected}</h2>
      ${isRunning
        ? '<span style="color:var(--green);font-size:13px;display:flex;align-items:center;gap:4px"><span class="running-dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite"></span> Running</span>'
        : '<span style="color:var(--text2);font-size:13px">Stopped</span>'
      }
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Cycles</div>
        <div class="value">${detail.cycles}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Cost</div>
        <div class="value">$${detail.cost.total_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Today</div>
        <div class="value">$${detail.cost.today_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">API Calls</div>
        <div class="value">${detail.cost.total_calls}</div>
      </div>
      <div class="stat-card" style="grid-column: span 2;">
        <div class="label">Budget -- $${detail.cost.total_usd.toFixed(4)} / $${maxTotal.toFixed(2)} total | $${detail.cost.today_usd.toFixed(4)} / $${maxDaily.toFixed(2)} daily</div>
        <div class="budget-bar"><div class="fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
    </div>
    <div class="identity-section">
      <h3>${detail.identity.name} v${detail.identity.version}</h3>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${detail.identity.purpose || ''}</div>
      <div>${(detail.identity.traits || []).map(t => `<span class="trait">${t}</span>`).join('')}</div>
    </div>
    <div class="cycles-list">
      <h3>Recent Cycles</h3>
      ${cycles.length === 0 ? '<div style="padding:12px 16px;color:var(--text2)">No cycles yet</div>' :
        cycles.reverse().map(c => `
          <div class="cycle-row">
            <span class="num">Cycle ${c.cycle || '?'}</span>
            <span class="action">${c.action || 'unknown'}</span>
            <span class="summary">${(c.summary || '').slice(0, 80)}</span>
            <span class="cost">$${(c.cost_after || 0).toFixed(4)}</span>
          </div>
        `).join('')}
    </div>
  `;
}

// --- Research ---
async function renderResearch() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const files = await api(`topics/${state.selected}/research`);
  if (files.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:20px">No research files yet. Run some cycles to generate research.</div>';
    return;
  }
  el.innerHTML = `
    <div class="file-list">
      ${files.map(f => `
        <div class="file-item" onclick="viewFile('${f.name}')">
          <span class="fname">${f.name}</span>
          <span class="fsize">${(f.size / 1024).toFixed(1)} KB</span>
        </div>
      `).join('')}
    </div>
    <div id="file-viewer-area"></div>
  `;
}

async function viewFile(name) {
  const area = document.getElementById('file-viewer-area');
  area.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const data = await api(`topics/${state.selected}/research/${name}`);
  area.innerHTML = `
    <div class="file-viewer">
      <h3>${name} <button class="back-btn" onclick="this.closest('.file-viewer').remove()">Close</button></h3>
      <div class="md-content">${renderMd(data.content)}</div>
    </div>
  `;
}

// --- Configure ---
async function renderConfigure() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const [mission, prompt] = await Promise.all([
    api(`topics/${state.selected}/mission`),
    api(`topics/${state.selected}/prompt`)
  ]);

  // Get current per-agent budget
  const topicData = state.topics.find(t => t.name === state.selected);
  const agentBudget = topicData && topicData.budget;
  const globalBudget = state.config.budget || {};
  const curTotal = (agentBudget && agentBudget.max_total_usd) || globalBudget.max_total_usd || 10;
  const curDaily = (agentBudget && agentBudget.max_per_day_usd) || globalBudget.max_per_day_usd || 10;

  el.innerHTML = `
    <div class="config-section">
      <h3>Agent Budget</h3>
      <div class="budget-form">
        <div class="budget-field">
          <label>Total budget ($)</label>
          <input type="number" id="budget-total" step="0.50" min="0" value="${curTotal}" />
        </div>
        <div class="budget-field">
          <label>Daily limit ($)</label>
          <input type="number" id="budget-daily" step="0.50" min="0" value="${curDaily}" />
        </div>
        <button class="save-btn" onclick="saveBudget(this)">Save Budget</button>
      </div>
    </div>
    <div class="config-section">
      <h3>mission.md</h3>
      <textarea id="mission-editor">${escHtml(mission.content)}</textarea>
      <button class="save-btn" onclick="saveMission(this)">Save Mission</button>
    </div>
    <div class="config-section">
      <h3>system_prompt.md</h3>
      <textarea id="prompt-editor">${escHtml(prompt.content)}</textarea>
      <button class="save-btn" onclick="savePrompt(this)">Save Prompt</button>
    </div>
  `;
}

async function saveBudget(btn) {
  const maxTotal = parseFloat(document.getElementById('budget-total').value);
  const maxDaily = parseFloat(document.getElementById('budget-daily').value);
  if (isNaN(maxTotal) || isNaN(maxDaily)) { alert('Enter valid numbers'); return; }
  await api(`topics/${state.selected}/budget`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ max_total_usd: maxTotal, max_per_day_usd: maxDaily })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Budget'; btn.classList.remove('saved'); }, 1500);
  // Reload topics to get updated budget
  state.topics = await api('topics');
  renderSidebar();
}

async function saveMission(btn) {
  const content = document.getElementById('mission-editor').value;
  await api(`topics/${state.selected}/mission`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Mission'; btn.classList.remove('saved'); }, 1500);
}

async function savePrompt(btn) {
  const content = document.getElementById('prompt-editor').value;
  await api(`topics/${state.selected}/prompt`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Prompt'; btn.classList.remove('saved'); }, 1500);
}

// --- Create modal ---
function showCreateModal() {
  const globalBudget = state.config.budget || {};
  const defaultTotal = globalBudget.max_total_usd || 10;
  const defaultDaily = globalBudget.max_per_day_usd || 10;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Create New Agent</h2>
      <input id="new-name" placeholder="Topic name (e.g. sports-research)" />
      <textarea id="new-desc" placeholder="One-line description"></textarea>
      <div class="budget-row">
        <div style="flex:1">
          <label>Total budget ($)</label>
          <input id="new-budget-total" type="number" step="0.50" min="0" value="${defaultTotal}" />
        </div>
        <div style="flex:1">
          <label>Daily limit ($)</label>
          <input id="new-budget-daily" type="number" step="0.50" min="0" value="${defaultDaily}" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-primary" onclick="createTopic()">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('new-name').focus();
}

async function createTopic() {
  const name = document.getElementById('new-name').value.trim();
  const desc = document.getElementById('new-desc').value.trim();
  const maxTotal = parseFloat(document.getElementById('new-budget-total').value);
  const maxDaily = parseFloat(document.getElementById('new-budget-daily').value);
  if (!name) return;
  const body = { name, description: desc };
  if (!isNaN(maxTotal)) body.max_total_usd = maxTotal;
  if (!isNaN(maxDaily)) body.max_per_day_usd = maxDaily;
  await api('topics', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  document.querySelector('.modal-overlay').remove();
  await load();
  selectTopic(name);
}

// --- Markdown renderer ---
function renderMd(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
