function buildHealthPanel(health) {
  if (!health) return '';
  const issues = health.issues || [];
  const hasCritical = issues.some(i => i.severity === 'critical');
  const hasWarning = issues.some(i => i.severity === 'warning');
  const badgeClass = hasCritical ? 'critical' : hasWarning ? 'warning' : 'ok';
  const badgeText = hasCritical ? 'Issues Found' : hasWarning ? 'Warning' : 'Healthy';
  const countText = issues.length > 0 ? `<span style="color:var(--text2);font-size:12px;font-weight:400;margin-left:4px">${issues.length} total</span>` : '';

  const typeLabels = {
    log_error: 'Log Error', process_crash: 'Crash', budget_stop: 'Budget', checkpoint: 'Checkpoint',
    stuck_reflecting: 'Stuck', repeating_summary: 'Loop', high_burn_no_output: 'Burn'
  };

  let issueRows = '';
  if (issues.length === 0) {
    issueRows = '<div style="color:var(--text2);font-size:13px;padding:4px 0">No issues detected. Agent is operating normally.</div>';
  } else {
    // Show newest first
    const sorted = [...issues].reverse();
    issueRows = '<div class="health-scroll">' + sorted.map(iss => {
      const icon = iss.severity === 'critical' ? '!' : '?';
      const d = iss.timestamp ? new Date(iss.timestamp) : null;
      const timeStr = d ? d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
      const typeTag = typeLabels[iss.type] || iss.type;
      const costStr = iss.cost_at != null ? `$${iss.cost_at.toFixed(4)}` : '';
      return `<div class="health-issue">
        <div class="issue-icon ${iss.severity}">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <span class="health-badge ${iss.severity}" style="font-size:9px;padding:1px 6px">${typeTag}</span>
            ${costStr ? `<span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${costStr}</span>` : ''}
          </div>
          <div class="issue-msg">${escHtml(iss.message)}</div>
        </div>
        ${timeStr ? `<div class="issue-time">${timeStr}</div>` : ''}
      </div>`;
    }).join('') + '</div>';
  }

  return `<div class="health-panel">
    <h3>Agent Health <span class="health-badge ${badgeClass}">${badgeText}</span>${countText}</h3>
    ${issueRows}
  </div>`;
}

    const color = target.getAttribute('data-color') || '#1a1a2e';
    if (!tip) { tooltip.style.display = 'none'; return; }
    tooltip.innerHTML = `<div class="tip-label" style="color:${color}">${tip}</div>`;
    tooltip.style.display = 'block';
    const rect = chartContainer.querySelector('div[style*="position:relative"]').getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let tx = mx - 20;
    let ty = my - tooltip.offsetHeight - 12;
    if (tx + tooltip.offsetWidth > rect.width) tx = rect.width - tooltip.offsetWidth - 4;

    tooltip.style.left = tx + 'px';

  const el = document.getElementById('content');

    api(`topics/${state.selected}`),
    api(`topics/${state.selected}/cycles?n=50`),
    api(`topics/${state.selected}/spend-history`).catch(() => ({points: []})),
    api(`topics/${state.selected}/health`).catch(() => ({issues: [], has_issues: false}))
  ]);

  // Use per-agent budget if available, else fall back to global
  const topicData = state.topics.find(t => t.name === state.selected);
  const agentBudget = topicData && topicData.budget;
  const globalBudget = state.config.budget || {};
  const maxTotal = (agentBudget && agentBudget.max_total_usd) || globalBudget.max_total_usd || 10;
  const maxDaily = (agentBudget && agentBudget.max_per_day_usd) || globalBudget.max_per_day_usd || 10;

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <h2 style="font-size:18px">${state.selected}</h2>
      ${isRunning
        ? '<span style="color:var(--green);font-size:13px;display:flex;align-items:center;gap:4px"><span class="running-dot" style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite"></span> Running</span>'
        : (topicData && topicData.checkpoint
            ? '<span style="color:var(--yellow);font-size:13px;font-weight:600">Paused — ' + topicData.checkpoint.label + ' checkpoint</span>'
            : '<span style="color:var(--text2);font-size:13px">Stopped</span>')

    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Cycles</div>
        <div class="value">${detail.cycles}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Cost</div>
        <div class="value">$${detail.cost.total_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Today</div>
        <div class="value">$${detail.cost.today_usd.toFixed(4)}</div>
      </div>
      <div class="stat-card">
        <div class="label">API Calls</div>
        <div class="value">${detail.cost.total_calls}</div>
      </div>
      <div class="stat-card" style="grid-column: span 2;">
        <div class="label">Budget -- $${detail.cost.total_usd.toFixed(4)} / $${maxTotal.toFixed(2)} total | $${detail.cost.today_usd.toFixed(4)} / $${maxDaily.toFixed(2)} daily</div>
        <div class="budget-bar"><div class="fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
    </div>
    ${buildSpendChart(spendData.points, maxTotal, health.issues)}
    ${buildHealthPanel(health)}
    <div class="identity-section">
      <h3>${detail.identity.name} v${detail.identity.version}</h3>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${detail.identity.purpose || ''}</div>
      <div>${(detail.identity.traits || []).map(t => `<span class="trait">${t}</span>`).join('')}</div>
    </div>
    ${buildActivityFeed(cycles)}
  `;

  // Restore scroll positions
  el.scrollTop = prevScrollTop;
  const newFeedList = el.querySelector('.feed-list');
  if (newFeedList) newFeedList.scrollTop = prevFeedScroll;

  initChartTooltips();
}

async function renderResearch() {

    data = await api(`topics/${state.selected}/buckets`);
  } catch (e) {
    // Fallback to flat file list
    data = { has_buckets: false, buckets: [], other_files: [] };
    try {
      const files = await api(`topics/${state.selected}/research`);
      data.other_files = files;
    } catch (_) {}
  }
  _bucketsCache = data;

  const allEmpty = data.buckets.length === 0 && data.other_files.length === 0;
  if (allEmpty) {
    el.innerHTML = '<div style="color:var(--text2);padding:20px">No research files yet. Run some cycles to generate research.</div>';
    return;
  }

  // Keep existing viewer if open
  const existingViewer = document.getElementById('file-viewer-area');
  let viewerHtml = '';
  if (existingViewer) {
    viewerHtml = existingViewer.outerHTML;
  }

  let html = '';

  // Fetch Notion config + status for Push All header
  const [notionCfgR, notionStatusR] = await Promise.all([
    fetch('/api/notion/config').then(r => r.json()).catch(() => ({ token_set: false, root_page_id: '' })),
    fetch(`/api/topics/${encodeURIComponent(state.selected)}/notion-status`).then(r => r.json()).catch(() => ({ published: false }))
  ]);
  const notionReady = notionCfgR.token_set && notionCfgR.root_page_id;
  let statusHtml = '';
  if (notionStatusR.published && notionStatusR.published_at) {
    const linkHtml = notionStatusR.database_url
      ? ` &mdash; <a href="${notionStatusR.database_url}" target="_blank">Open Hub Database</a>`
      : '';
    statusHtml = `<span class="notion-status">Last published ${formatTimestamp(notionStatusR.published_at)}${linkHtml}</span>`;
  } else if (!notionReady) {
    statusHtml = '<span class="notion-status">Configure Notion in the Configure tab to enable</span>';
  }
  html += `
    <div class="research-header">
      <button class="push-all-btn" id="push-all-notion-btn" onclick="publishAllToNotion(this)" ${notionReady ? '' : 'disabled'} title="${notionReady ? 'Publish all research to Notion hub database' : 'Configure Notion token & root page ID first'}">Push All to Notion</button>
      ${statusHtml}
    </div>
  `;

  if (data.has_buckets && data.buckets.length > 0) {
    html += '<div id="bucket-list">';
    for (const b of data.buckets) {
      const fileCount = b.files.length;
      const sizeKb = (b.total_size / 1024).toFixed(1);
      const pubStatus = b.published_at ? `Published ${formatTimestamp(b.published_at)}` : '';
      const hasPageId = b.notion_page_id && b.notion_page_id.trim();

      html += `
        <div class="bucket-section" id="bucket-${b.index}">
          <div class="bucket-header" onclick="toggleBucket(${b.index})">
            <div class="bucket-title">
              <span class="arrow" id="arrow-${b.index}">&#9654;</span>
              ${escHtml(b.name)}
            </div>
            <div class="bucket-meta">
              <span>${fileCount} file${fileCount !== 1 ? 's' : ''} &middot; ${sizeKb} KB</span>
              ${pubStatus ? `<span class="bucket-status">${escHtml(pubStatus)}</span>` : ''}
            </div>
          </div>
          <div class="bucket-body" id="bucket-body-${b.index}">
            <div class="bucket-files">
              ${b.files.map(f => `
                <div class="file-item" onclick="viewFile('${esc(f.name)}')">
                  <span class="fname">${escHtml(f.name)}</span>
                  <span class="fsize">${(f.size / 1024).toFixed(1)} KB</span>
                </div>
              `).join('')}
            </div>
            <div class="bucket-notion-row">
              <input type="text" id="bucket-notion-${b.index}" value="${escHtml(b.notion_page_id || '')}" placeholder="Notion page ID for this bucket" />
              <button class="bucket-save-btn" id="bucket-save-${b.index}" onclick="saveBucketNotionPage(${b.index})">Save</button>
              <button class="bucket-publish-btn" id="bucket-pub-${b.index}" onclick="publishBucket(${b.index})" ${hasPageId ? '' : 'disabled'}>Push to Notion</button>
              <span class="bucket-status" id="bucket-status-${b.index}"></span>
            </div>
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  if (data.other_files.length > 0) {
    html += `
      <div class="bucket-section" id="bucket-other" style="margin-top:${data.buckets.length > 0 ? '20px' : '0'}">
        <div class="bucket-header" onclick="toggleBucket('other')">
          <div class="bucket-title">
            <span class="arrow" id="arrow-other">&#9654;</span>
            Other Files
          </div>
          <div class="bucket-meta">
            <span>${data.other_files.length} file${data.other_files.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="bucket-body" id="bucket-body-other">
          <div class="bucket-files">
            ${data.other_files.map(f => `
              <div class="file-item" onclick="viewFile('${esc(f.name)}')">

              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  html += `<div id="file-viewer-area">${viewerHtml ? '' : ''}</div>`;

  if (existingViewer) {
    // Preserve viewer, just update bucket list
    const listArea = document.getElementById('bucket-list') || document.getElementById('bucket-other');
    if (listArea) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      // Replace everything before the viewer
      el.innerHTML = html;
      // Restore viewer
      document.getElementById('file-viewer-area').innerHTML = existingViewer.innerHTML;
    } else {
      el.innerHTML = html;
    }
  } else {
    el.innerHTML = html;
  }

  // Auto-expand if no buckets (flat list mode)
  if (!data.has_buckets && data.other_files.length > 0) {
    toggleBucket('other');
  }
}

function toggleBucket(index) {
  const body = document.getElementById(`bucket-body-${index}`);
  const arrow = document.getElementById(`arrow-${index}`);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

async function saveBucketNotionPage(index) {
  const input = document.getElementById(`bucket-notion-${index}`);
  const btn = document.getElementById(`bucket-save-${index}`);
  const pubBtn = document.getElementById(`bucket-pub-${index}`);
  const pageId = input.value.trim();

  btn.textContent = 'Saving...';
  try {
    await api(`topics/${state.selected}/buckets/${index}/notion-page`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notion_page_id: pageId }),
    });
    btn.textContent = 'Saved';
    btn.classList.add('saved');
    if (pubBtn) pubBtn.disabled = !pageId;
    setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2000);
  } catch (e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Save'; }, 2000);
  }
}

async function publishBucket(index) {
  const btn = document.getElementById(`bucket-pub-${index}`);
  const statusEl = document.getElementById(`bucket-status-${index}`);
  btn.disabled = true;
  btn.textContent = 'Publishing...';
  statusEl.textContent = '';

  try {
    const result = await api(`topics/${state.selected}/buckets/${index}/publish`, { method: 'POST' });
    btn.textContent = 'Push to Notion';
    btn.disabled = false;
    statusEl.innerHTML = `<a href="${result.url}" target="_blank" style="color:var(--green);font-weight:500">Published ${formatTimestamp(result.published_at)}</a>`;
  } catch (e) {
    btn.textContent = 'Push to Notion';
    btn.disabled = false;
    statusEl.innerHTML = `<span style="color:var(--red)">Failed: ${escHtml(e.message)}</span>`;
  }
}

async function publishAllToNotion(btn) {
  btn.disabled = true;
  btn.textContent = 'Publishing...';
  try {
    const result = await api(`topics/${state.selected}/publish-to-notion`, { method: 'POST' });
    btn.textContent = 'Push All to Notion';
    btn.disabled = false;
    // Update status next to button
    const header = btn.closest('.research-header');
    if (header) {
      let statusEl = header.querySelector('.notion-status');
      if (!statusEl) { statusEl = document.createElement('span'); statusEl.className = 'notion-status'; header.appendChild(statusEl); }
      const dbLink = result.database_url ? ` &mdash; <a href="${result.database_url}" target="_blank">Open Hub Database</a>` : '';
      statusEl.innerHTML = `Published ${formatTimestamp(result.published_at)}${dbLink}`;
    }
  } catch (e) {
    btn.textContent = 'Push All to Notion';
    btn.disabled = false;
    const header = btn.closest('.research-header');
    if (header) {
      let statusEl = header.querySelector('.notion-status');
      if (!statusEl) { statusEl = document.createElement('span'); statusEl.className = 'notion-status'; header.appendChild(statusEl); }
      statusEl.innerHTML = `<span style="color:var(--red)">Failed: ${escHtml(e.message)}</span>`;
    }
  }
}

async function viewFile(name) {
  const area = document.getElementById('file-viewer-area');
  area.innerHTML = '<div style="color:var(--text2)">Loading...</div>';
  const data = await api(`topics/${state.selected}/research/${name}`);
  area.innerHTML = `
    <div class="file-viewer">
      <h3>${name} <button class="back-btn" onclick="this.closest('.file-viewer').remove()">Close</button></h3>
      <div class="md-content">${renderMd(data.content)}</div>
    </div>
  `;
}

async function publishConfigDoc(docType, btn) {
  const statusId = docType === 'mission' ? 'publish-mission-status' : 'publish-params-status';
  const statusEl = document.getElementById(statusId);
  const origText = btn.textContent;
  btn.textContent = 'Publishing...';
  btn.disabled = true;
  try {
    const result = await api(`topics/${state.selected}/publish-config-doc`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ doc_type: docType })
    });
    statusEl.innerHTML = `<a href="${result.url}" target="_blank" style="color:var(--green);font-weight:500">Published ${formatTimestamp(result.published_at)}</a>`;
    btn.textContent = 'Published!';
    setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--red)">${e.message || 'Publish failed'}</span>`;
    btn.textContent = origText;
    btn.disabled = false;
  }
}

async function deleteTopic(name) {
  try {
    await api(`topics/${name}`, { method: 'DELETE' });
    document.querySelector('.modal-overlay').remove();
    if (state.selected === name) {
      state.selected = null;
      document.getElementById('agent-control').innerHTML = '';
    }
    await load();
  } catch (e) {
    alert('Failed to delete: ' + e.message);
  }
}

// --- Create modal ---
async function showCreateModal() {
  const globalBudget = state.config.budget || {};
  const defaultTotal = globalBudget.max_total_usd || 10;
  const defaultDaily = globalBudget.max_per_day_usd || 10;

  // Fetch templates
  let templates = [];
  try { templates = await api('templates'); } catch (e) { /* proceed without */ }

  let templateCards = `<div class="template-card selected" onclick="selectTemplate(this, '')">`
    + `<div class="tc-top"><div class="tc-icon">✨</div><div class="tc-info">`
    + `<div class="tc-name">Custom (AI-generated)</div>`
    + `<div class="tc-desc">LLM generates a unique research scaffold tailored to your topic</div>`
    + `</div></div></div>`;
  for (const t of templates) {
    let phases = '';
    t.phases.forEach((p, i) => {
      const guides = (p.guiding_questions || []).map(q => `<li>${q}</li>`).join('');
      phases += `<div class="tc-phase-row">`
        + `<div class="tc-phase-num">${i + 1}</div>`
        + `<div class="tc-phase-detail">`
        + `<div class="tc-phase-title">${p.title}</div>`
        + `<div class="tc-phase-q">${p.question}</div>`
        + `<div class="tc-phase-file">${p.filename}</div>`
        + `</div></div>`
        + (guides ? `<ul class="tc-guide">${guides}</ul>` : '');
    });
    templateCards += `<div class="template-card" onclick="selectTemplate(this, '${t.slug}')">`
      + `<div class="tc-top"><div class="tc-icon">${t.icon}</div><div class="tc-info">`
      + `<div class="tc-name">${t.name}</div>`
      + `<div class="tc-desc">${t.description}</div>`
      + `</div><div class="tc-phases">${t.phase_count} phases</div>`
      + `<div class="tc-chevron">▶</div></div>`
      + `<div class="tc-output">${phases}</div>`
      + `</div>`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="width:500px">
      <h2>Create New Agent</h2>
      <input id="new-name" placeholder="Topic name (e.g. sports-research)" />
      <textarea id="new-desc" placeholder="One-line description"></textarea>
      <input type="hidden" id="new-template" value="" />
      <div class="template-label">Research Template</div>
      <div class="template-grid">${templateCards}</div>
      <div class="budget-row">
        <div style="flex:1">
          <label>Total budget ($)</label>
          <input id="new-budget-total" type="number" step="0.50" min="0" value="${defaultTotal}" />
        </div>
        <div style="flex:1">
          <label>Daily limit ($)</label>
          <input id="new-budget-daily" type="number" step="0.50" min="0" value="${defaultDaily}" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-primary" onclick="createTopic()">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('new-name').focus();
}

function selectTemplate(el, slug) {
  const grid = el.closest('.template-grid');
  // Selection — always exactly one selected
  grid.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('new-template').value = slug;

  // Expand/collapse — toggle clicked card, collapse others
  const wasExpanded = el.classList.contains('expanded');
  grid.querySelectorAll('.template-card').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded && slug) {
    el.classList.add('expanded');
  }
}

async function createTopic() {
  const name = document.getElementById('new-name').value.trim();
  const desc = document.getElementById('new-desc').value.trim();
  const tpl = document.getElementById('new-template').value;
  const maxTotal = parseFloat(document.getElementById('new-budget-total').value);
  const maxDaily = parseFloat(document.getElementById('new-budget-daily').value);
  if (!name) return;
  const body = { name, description: desc };
  if (tpl) body.template = tpl;
  if (!isNaN(maxTotal)) body.max_total_usd = maxTotal;
  if (!isNaN(maxDaily)) body.max_per_day_usd = maxDaily;
  try {
    await api('topics', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    document.querySelector('.modal-overlay').remove();
    await load();
    state.tab = 'configure';
    selectTopic(name);
  } catch (e) {
    alert('Failed to create agent: ' + e.message);
  }
}

async function saveTopicEdits(originalName) {
  const newName = document.getElementById('edit-name').value.trim();
  const desc = document.getElementById('edit-desc').value.trim();
  const maxTotal = parseFloat(document.getElementById('edit-budget-total').value);
  const maxDaily = parseFloat(document.getElementById('edit-budget-daily').value);
  if (!newName) { alert('Name is required'); return; }

  let currentName = originalName;
  try {
    // 1. Rename if name changed
    if (newName !== originalName) {
      await api(`topics/${originalName}/rename`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ new_name: newName })
      });
      currentName = newName;
    }
    // 2. Update description/purpose
    await api(`topics/${currentName}/identity`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ purpose: desc })
    });
    // 3. Update budget
    if (!isNaN(maxTotal) && !isNaN(maxDaily)) {
      await api(`topics/${currentName}/budget`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ max_total_usd: maxTotal, max_per_day_usd: maxDaily })
      });
    }
    // 4. Close modal, reload, re-select
    document.querySelector('.modal-overlay').remove();
    await load();
    selectTopic(currentName);
  } catch (e) {
    alert('Failed to save: ' + e.message);
  }
}

// --- Markdown renderer ---
function renderMd(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
